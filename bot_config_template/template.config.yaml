---
project:
  name: "my-repo"
  description: "Brief description of the repository"

global_config:
  language: "en"

model:
  provider: "openai"
  name: "gpt-5.2-codex"
  max_tokens: 4096
  temperature: 0.2

code_review:
  tone: "constructive"  # "constructive", "strict", "concise", "educational"
  focus:
    - "correctness"
    - "security"
    # - "performance"
    # - "readability"
    # - "testing"
  ignore_patterns:
    - "*.min.js"
    - "dist/**"
    - ".tekton/**"

dependency_review:
  enabled: true
  manifest_files:
    - "package-lock.json"
    - "package.json"
    # - "pom.xml"
    # - "go.mod"
    # - "requirements.txt"
  risk_tolerance: "medium"  # "low", "medium", "high"
